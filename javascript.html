<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript CRUD - Web programozás-1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>
        <nav>
            <a href="index.html">Főoldal</a>
            <a href="javascript.html" class="active">Csapatok listája (JS CRUD)</a>
            <a href="react.html">Játékosok (React CRUD)</a>
            <a href="spa.html">SPA React</a>
            <a href="fetchapi.html">Fetch API</a>
            <a href="axios.html">Axios CRUD</a>
            <a href="oojs.html">OOJS</a>
        </nav>
    </header>

    <main>
        <section class="glass-panel">
            <h2>NB I Csapatok</h2>
            
            <form id="crud-form" class="crud-form">
                <input type="hidden" id="club-id">
                <input type="text" id="club-name" placeholder="Csapatnév megadása (pl. Vasas FC)" required autocomplete="off">
                <button type="submit" id="submit-btn">Hozzáadás</button>
            </form>

            <div class="table-container">
                <table id="clubs-table">
                    <thead>
                        <tr>
                            <th style="width: 10%;">ID</th>
                            <th>Csapatnév</th>
                            <th style="width: 20%; text-align: right;">Műveletek</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Javascript tölti ki -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>Készítette: <span>dr. Fekete József, Jobbágy Bertalan</span> | Neptun kód: <span>WXZS41, IQGE2B</span></p>
    </footer>

    <script src="js/app.js"></script>
</body>
